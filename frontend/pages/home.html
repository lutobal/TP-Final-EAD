<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio — NeuroRehab Platform</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Barra superior + menú hamburguesa: este mismo bloque se repite igual
       en todas las páginas internas, a propósito, para que cada página se
       entienda sola sin tener que ir a buscar código a otro archivo. -->
  <div class="topbar">
    <span class="topbar-brand">NeuroRehab Platform</span>
    <span class="topbar-info" id="topbar-info"></span>
    <div class="topbar-actions">
      <a href="/pages/home.html" class="home-button" aria-label="Ir al inicio" title="Inicio">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
      </a>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Abrir menú">☰</button>
    </div>
  </div>
  <nav class="hamburger-menu" id="hamburger-menu" hidden>
    <ul>
      <li><a href="/pages/home.html">Inicio</a></li>
      <li><a href="/pages/historial.html">Historial</a></li>
      <li><a href="/pages/pacientes.html">Pacientes</a></li>
      <li><a href="/pages/estado-dispositivo.html">Estado del dispositivo</a></li>
      <li><button id="cerrar-paciente" class="link-button" type="button">Cerrar paciente</button></li>
      <li><button id="cerrar-sesion" class="link-button" type="button">Cerrar sesión</button></li>
    </ul>
  </nav>

  <main class="page-content">
    <h1>Tests disponibles</h1>
    <p class="page-subtitle">Seleccioná un test para ver su descripción.</p>
    <section id="tests-grid" class="cards-grid"></section>
  </main>

  <script>
    // Si no hay un médico con sesión iniciada, no se puede estar acá.
    const medicoGuardado = sessionStorage.getItem("medico");

    if (!medicoGuardado) {
      window.location.href = "/index.html";
    } else {
      const medico = JSON.parse(medicoGuardado);
      const pacienteGuardado = sessionStorage.getItem("paciente");
      const paciente = pacienteGuardado ? JSON.parse(pacienteGuardado) : null;

      // --- Barra superior y menú (igual en todas las páginas internas) ---
      document.getElementById("topbar-info").textContent =
        `Dr./Dra. ${medico.nombre} · ${paciente ? `Paciente: ${paciente.nombre} ${paciente.apellido}` : "Sin paciente activo"} · Dispositivo desconectado`;

      document.getElementById("menu-toggle").addEventListener("click", () => {
        const menu = document.getElementById("hamburger-menu");
        menu.hidden = !menu.hidden;
      });

      document.getElementById("cerrar-sesion").addEventListener("click", () => {
        sessionStorage.removeItem("medico");
        window.location.href = "/index.html";
      });

      document.getElementById("cerrar-paciente").addEventListener("click", () => {
        sessionStorage.removeItem("paciente");
        location.reload();
      });

      // --- Lo que es propio de esta página: traer y mostrar los tests ---
      async function cargarTests() {
        const grid = document.getElementById("tests-grid");
        const respuesta = await fetch("/api/tests");
        const tests = await respuesta.json();

        grid.innerHTML = tests
          .map(
            (test) => `
            <a class="card" href="/pages/test-detail.html?slug=${test.slug}">
              <h2>${test.nombre}</h2>
              <p>${test.evalua}</p>
            </a>
          `
          )
          .join("");
      }

      cargarTests();
    }
  </script>
</body>
</html>
